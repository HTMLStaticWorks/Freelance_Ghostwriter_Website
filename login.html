<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Julian Thorne Ghostwriting Studio</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
</head>
<body class="bg-secondary">

    <div class="auth-wrapper">
        <button class="theme-toggle auth-theme-toggle" title="Toggle Theme">
            <i class="bi bi-moon"></i>
        </button>
        <button class="lang-toggle auth-lang-toggle" title="Toggle RTL">
            <i class="bi bi-arrow-left-right"></i>
        </button>

        <div class="auth-card reveal-page">
            <div class="text-center mb-5">
                <a href="index.html" class="logo"><img src="assets/images/logo.png" alt="JT Logo" class="logo-img">JULIAN THORNE</a>
            </div>

            <h1 class="auth-title serif">Welcome Back</h1>
            <p class="auth-subtitle">Sign in to the Studio to track your manuscript.</p>

            <button class="btn-social">
                <i class="bi bi-google"></i>Google
            </button>

            <button class="btn-social">
                <i class="bi bi-apple"></i>Apple
            </button>

            <div class="divider">
                <span>Or use email</span>
            </div>

            <form class="auth-form" onsubmit="event.preventDefault(); window.location.href='dashboard.html';">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" placeholder="david@example.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrap">
                        <input type="password" class="form-control" placeholder="••••••••" required>
                        <button type="button" class="password-toggle" aria-label="Toggle password visibility">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-4 small">
                    <div class="d-flex align-items-center gap-2">
                        <input type="checkbox" id="remember" class="mt-0">
                        <label for="remember" class="mb-0 opacity-75">Remember me</label>
                    </div>
                    <a href="#" class="auth-link">Forgot Password?</a>
                </div>

                <button type="submit" class="btn-custom w-100 mt-4 py-3">Login to Studio</button>
            </form>

            <div class="mt-5 text-center small">
                <span class="opacity-50">New to the Studio?</span>
                <a href="register.html" class="auth-link ms-1">Apply for an Account</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/main.js"></script>
</body>
</html>
