<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Julian Thorne Ghostwriting Studio</title>
    <link rel="icon" type="image/png" href="assets/images/logo.png">
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
</head>
<body class="bg-secondary">

    <div class="auth-wrapper">
        <button class="theme-toggle auth-theme-toggle" title="Toggle Theme">
            <i class="bi bi-moon"></i>
        </button>

        <div class="auth-card reveal-page">
            <div class="text-center mb-5">
                <a href="index.html" class="logo"><img src="assets/images/logo.png" alt="JT Logo" class="logo-img">JULIAN THORNE</a>
            </div>

            <h1 class="auth-title serif">Join the Studio</h1>
            <p class="auth-subtitle">Apply for an account to start your book journey.</p>

            <button class="btn-social">
                <i class="bi bi-google"></i>Google
            </button>
            <button class="btn-social">
                <i class="bi bi-facebook"></i>Facebook
            </button>

            <div class="divider">
                <span>Or create manually</span>
            </div>

            <form class="auth-form" onsubmit="event.preventDefault(); window.location.href='login.html'; alert('Your application has been received. Please verify your email.');">
                <div class="form-group row">
                    <div class="col-md-12">
                         <label>Full Name</label>
                         <input type="text" class="form-control" placeholder="David Chen" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" placeholder="david@example.com" required>
                </div>
                <div class="form-group">
                    <label>Create Password</label>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>

                <div class="mb-4 d-flex align-items-start gap-2 small">
                    <input type="checkbox" id="terms" required class="mt-1">
                    <label for="terms" class="mb-0 text-transform-none opacity-100 p-0 text-start">I agree to the <a href="#" class="auth-link">Non-Disclosure Agreement</a> and Terms of Service.</label>
                </div>

                <button type="submit" class="btn-custom w-100 py-3">Submit Application</button>
            </form>

            <div class="mt-5 text-center small">
                <span class="opacity-50">Already an active client?</span>
                <a href="login.html" class="auth-link ms-1">Login to Studio</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="assets/js/main.js"></script>
</body>
</html>
